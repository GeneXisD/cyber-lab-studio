<!DOCTYPE html>
<html lang="en">
<head>

  <title>Victor Cyber Lab Studio</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="terminal" id="terminal">
    <div class="output" id="output"></div>

<form class="input-line" id="command-form">

</form>
  </div>

  <script src="terminal.js"></script>
